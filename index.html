<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FutboLike</title>

<script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#1a1a1a;
    padding:20px;
    text-align:center;
    font-size:32px;
    font-weight:bold;
}

.live{
    color:red;
    font-size:16px;
}

.container{
    width:95%;
    max-width:1100px;
    margin:auto;
}

#search{
    width:100%;
    padding:12px;
    margin:15px 0;
    border-radius:8px;
    border:none;
}

#channelList{
    width:100%;
    padding:12px;
    border-radius:8px;
}

.player{
    position:relative;
    margin-top:20px;
}

video{
    width:100%;
    border-radius:12px;
}

.logo{
    position:absolute;
    top:15px;
    right:15px;
    width:100px;
}

.ticker{
    position:absolute;
    bottom:0;
    width:100%;
    background:rgba(0,0,0,0.7);
    overflow:hidden;
    padding:8px 0;
}

.ticker span{
    white-space:nowrap;
    display:inline-block;
    animation:scroll 20s linear infinite;
}

@keyframes scroll{
from{transform:translateX(100%)}
to{transform:translateX(-100%)}
}

.social{
    text-align:center;
    margin:30px 0;
}

.social a{
    text-decoration:none;
    color:white;
    padding:15px 25px;
    border-radius:50px;
    margin:10px;
    display:inline-block;
    font-weight:bold;
}

.fb{
    background:#1877F2;
}

.ig{
    background:linear-gradient(45deg,#F58529,#DD2A7B,#8134AF,#515BD4);
}
</style>
</head>

<body>

<header>
FutboLike<br>
<span class="live">🔴 EN VIVO</span>
</header>

<div class="container">

<input type="text" id="search" placeholder="Buscar canal...">

<select id="channelList"></select>

<div class="player">
    <img src="logo.png" class="logo">
    <video id="video" controls autoplay></video>

    <div class="ticker">
        <span>
        Bienvenido a FutboLike • Disfruta nuestra programación deportiva • Síguenos en nuestras redes sociales.
        </span>
    </div>
</div>

<div class="social">
    <a class="fb" href="https://www.facebook.com/TU_PAGINA" target="_blank">📘 Facebook</a>
    <a class="ig" href="https://www.instagram.com/TU_USUARIO" target="_blank">📸 Instagram</a>
</div>

</div>

<script>
const video = document.getElementById("video");
const selector = document.getElementById("channelList");
const search = document.getElementById("search");

let canales = [];
let hls;

function cargarCanal(url){
    if(hls){ hls.destroy(); }

    if(Hls.isSupported()){
        hls = new Hls();
        hls.loadSource(url);
        hls.attachMedia(video);
    }else{
        video.src = url;
    }
}

fetch("canales.m3u")
.then(response => response.text())
.then(data => {

    const lines = data.split("\n");

    for(let i=0;i<lines.length;i++){
        if(lines[i].startsWith("#EXTINF")){
            canales.push({
                nombre: lines[i].split(",")[1],
                url: lines[i+1].trim()
            });
        }
    }

    mostrarCanales(canales);
});

function mostrarCanales(lista){
    selector.innerHTML = "";

    lista.forEach(canal=>{
        const option = document.createElement("option");
        option.textContent = canal.nombre;
        option.value = canal.url;
        selector.appendChild(option);
    });

    if(lista.length>0){
        cargarCanal(lista[0].url);
    }
}

selector.addEventListener("change", ()=>{
    cargarCanal(selector.value);
});

search.addEventListener("input", ()=>{
    const filtro = search.value.toLowerCase();

    const resultado = canales.filter(canal =>
        canal.nombre.toLowerCase().includes(filtro)
    );

    mostrarCanales(resultado);
});
</script>

</body>
</html>
